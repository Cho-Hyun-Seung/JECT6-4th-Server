services:
  boost-app:
    build: .
    container_name: boost-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-boost}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-boost}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-boost}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_HOST: boost-rabbitmq
      KAKAO_OAUTH_CLIENT_ID: ${KAKAO_OAUTH_CLIENT_ID}
      KAKAO_OAUTH_CLIENT_SECRET: ${KAKAO_OAUTH_CLIENT_SECRET}
      APP_FRONTEND_OAUTH_CALLBACK_URL: ${APP_FRONTEND_OAUTH_CALLBACK_URL:-http://localhost:3000/auth/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: boost-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - boost-app
    restart: unless-stopped


  postgres:
    image: pgvector/pgvector:pg16
    container_name: boost-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-boost}
      POSTGRES_USER: ${POSTGRES_USER:-boost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boost}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: boost-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  boost-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: boost-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres-data:
  redis-data:
